name: Sync tributes from Cognito

# Pulls approved + public condolences from Cognito into tributes.json and commits if changed.
#
# Starts as manual-only (Run workflow button) so it can't surprise-overwrite tributes.json
# before you've marked entries "Approved" in Cognito. Once tested, uncomment the `schedule`
# block below to run it automatically every ~15 minutes.

on:
  workflow_dispatch:
    inputs:
      diag:
        description: 'Set to 1 to probe API access (no sync/commit)'
        required: false
        default: ''
  # schedule:
  #   - cron: '*/15 * * * *'   # every 15 min (GitHub may delay scheduled runs a few minutes)

permissions:
  contents: write

concurrency:
  group: sync-tributes
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync tributes.json from Cognito
        env:
          COGNITO_API_KEY: ${{ secrets.COGNITO_API_KEY }}
          SYNC_DIAG: ${{ inputs.diag }}
        run: python3 scripts/sync_tributes.py

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain tributes.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tributes.json
            git commit -m "chore: sync approved tributes from Cognito [skip ci]"
            git push
            echo "Updated tributes.json."
          else
            echo "No changes to tributes.json."
          fi
