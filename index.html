<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>En mémoire de Dr. TOGBEY Kwamy Maoussi Félix</title>
  <style>
    :root { --ivory:#fbf7ee; --gold:#9e7938; --ink:#2c2a2a; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--ivory); color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      text-align: center; padding: 32px 16px 56px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 4px; }
    .dates { color: var(--gold); font-style: italic; margin: 0 0 28px; }
    img.flyer {
      width: 100%; max-width: 520px; height: auto;
      box-shadow: 0 6px 24px rgba(0,0,0,.18); border-radius: 4px;
    }
    .actions { margin-top: 24px; }
    .actions a {
      display: inline-block; text-decoration: none;
      border: 1px solid var(--gold); color: var(--gold);
      padding: 10px 24px; border-radius: 999px; font-size: .95rem;
    }
  </style>
</head>
<body>
  <h1>Dr. TOGBEY Kwamy Maoussi Félix</h1>
  <p class="dates">20 novembre 1948 &nbsp;–&nbsp; 24 mai 2026</p>

  <img class="flyer" src="flyer_single.png" alt="Flyer mémorial" />

  <div class="actions">
    <a href="flyer_single.png" download>Télécharger le flyer</a>
  </div>
</body>
</html>
